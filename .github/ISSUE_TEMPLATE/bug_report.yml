name: Bug Report
description: Report a problem with the progress bar
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal PHP code to reproduce the issue
      render: php
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?

  - type: input
    id: php-version
    attributes:
      label: PHP version
      description: Run `php --version` and paste the output
    validations:
      required: true

  - type: input
    id: library-version
    attributes:
      label: Library version
      description: Version from composer.json or packagist
    validations:
      required: true
